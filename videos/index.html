<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CineVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
<style>

/* ============================================================
   MOVIE / TV SHOW CONFIGURATION — EDIT THIS SECTION
   To add a title, copy a block in the JS config below.
   ============================================================ */

/* ── CSS Variables ──────────────────────────────────────── */
:root {
  --bg:        #0a0a0f;
  --surface:   #12121a;
  --card:      #18181f;
  --border:    rgba(255,255,255,.07);
  --text:      #e8e8f0;
  --muted:     #6b6b80;
  --accent:    #e8b84b;
  --accent2:   #e8604b;
  --pill-bg:   rgba(232,184,75,.1);
  --shadow:    0 20px 60px rgba(0,0,0,.6);
  --radius:    14px;
  --transition: .35s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"] {
  --bg:      #f2f0eb;
  --surface: #e8e5de;
  --card:    #ffffff;
  --border:  rgba(0,0,0,.08);
  --text:    #1a1a26;
  --muted:   #8a8a9a;
  --pill-bg: rgba(232,184,75,.15);
  --shadow:  0 20px 60px rgba(0,0,0,.12);
}

/* ── Reset ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition), color var(--transition);
}

/* ── Loading Screen ─────────────────────────────────────── */
#loader {
  position: fixed; inset: 0; z-index: 9999;
  background: #0a0a0f;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px;
  transition: opacity .6s ease, visibility .6s ease;
}
#loader.hide { opacity: 0; visibility: hidden; }
.loader-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(48px, 10vw, 88px);
  letter-spacing: 8px;
  background: linear-gradient(135deg, #e8b84b, #e8604b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: logoIn .8s cubic-bezier(.2,1.4,.4,1) both;
}
@keyframes logoIn {
  from { opacity:0; transform: scale(.6) translateY(20px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}
.loader-bar-wrap {
  width: 200px; height: 3px;
  background: rgba(255,255,255,.1);
  border-radius: 99px; overflow: hidden;
}
.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, #e8b84b, #e8604b);
  border-radius: 99px;
  animation: barFill 1.4s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes barFill {
  from { width: 0; }
  to   { width: 100%; }
}
.loader-sub {
  font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(255,255,255,.35);
  animation: fadeUp .6s .4s both;
}

/* ── Header ─────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  padding: 0 clamp(16px,4vw,48px);
  height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,15,.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
[data-theme="light"] header { background: rgba(242,240,235,.88); }
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 4px;
  background: linear-gradient(135deg,#e8b84b,#e8604b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  text-decoration: none; user-select: none;
}
.header-right { display: flex; align-items: center; gap: 16px; }

/* ── Theme Toggle ───────────────────────────────────────── */
.theme-btn {
  position: relative; width: 56px; height: 28px;
  background: none; border: 2px solid var(--border);
  border-radius: 99px; cursor: pointer;
  display: flex; align-items: center;
  padding: 3px;
  transition: border-color var(--transition), background var(--transition);
  outline: none;
}
.theme-btn:hover { border-color: var(--accent); }
.theme-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: linear-gradient(135deg,#e8b84b,#e8604b);
  transition: transform .4s cubic-bezier(.4,0,.2,1);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0;
}
[data-theme="light"] .theme-thumb { transform: translateX(26px); }
.theme-icon-sun, .theme-icon-moon {
  position: absolute;
  font-size: 11px;
  transition: opacity .3s;
}
.theme-icon-sun  { right: 7px; }
.theme-icon-moon { left: 7px; }
[data-theme="dark"]  .theme-icon-sun  { opacity: .5; }
[data-theme="dark"]  .theme-icon-moon { opacity: 0; }
[data-theme="light"] .theme-icon-sun  { opacity: 0; }
[data-theme="light"] .theme-icon-moon { opacity: .5; }

/* ── Hero / Search ──────────────────────────────────────── */
.hero {
  padding: clamp(48px,8vw,90px) clamp(16px,4vw,48px) 40px;
  text-align: center;
  animation: fadeUp .7s .1s both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(22px); }
  to   { opacity:1; transform:translateY(0); }
}
.hero h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 7vw, 72px);
  letter-spacing: 3px;
  line-height: 1;
  margin-bottom: 10px;
}
.hero h1 span {
  background: linear-gradient(135deg,#e8b84b,#e8604b);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero p { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

.search-wrap {
  position: relative; max-width: 540px; margin: 0 auto;
}
.search-wrap input {
  width: 100%; padding: 14px 50px 14px 20px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color .25s, box-shadow .25s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(232,184,75,.15);
}
.search-icon {
  position: absolute; right: 18px; top: 50%;
  transform: translateY(-50%);
  color: var(--muted); font-size: 16px; pointer-events: none;
}

/* ── Filter Bar ─────────────────────────────────────────── */
.filter-section {
  padding: 0 clamp(16px,4vw,48px) 32px;
  animation: fadeUp .7s .2s both;
  position: relative;
  z-index: 200;
}
.filter-row {
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-right: 4px;
}

/* dropdown */
.dropdown-wrap { position: relative; }
.dropdown-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: 99px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 14px; cursor: pointer; outline: none;
  transition: border-color .25s, background .25s;
  white-space: nowrap;
}
.dropdown-btn:hover, .dropdown-btn.open {
  border-color: var(--accent);
  background: var(--card);
}
.dropdown-arrow {
  font-size: 10px; color: var(--accent);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.dropdown-btn.open .dropdown-arrow { transform: rotate(180deg); }
.dropdown-menu {
  position: absolute; top: calc(100% + 8px); left: 0;
  min-width: 160px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  transform-origin: top left;
  transform: scaleY(0) translateY(-8px);
  opacity: 0;
  transition: transform .3s cubic-bezier(.4,0,.2,1), opacity .25s;
  z-index: 9999;
  box-shadow: var(--shadow);
}
.dropdown-menu.open {
  transform: scaleY(1) translateY(0);
  opacity: 1;
}
.dropdown-item {
  padding: 10px 18px;
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: background .2s, color .2s;
  border-radius: 8px;
  margin: 4px;
}
.dropdown-item:hover { background: var(--surface); }
.dropdown-item.active { color: var(--accent); }
.dropdown-item .item-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); opacity: 0;
  transition: opacity .2s;
}
.dropdown-item.active .item-dot { opacity: 1; }

/* genre pills */
.genre-pill {
  padding: 8px 16px; border-radius: 99px; font-size: 13px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--muted); cursor: pointer; outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: all .25s;
  white-space: nowrap;
}
.genre-pill:hover { border-color: var(--accent); color: var(--text); }
.genre-pill.active {
  background: var(--pill-bg);
  border-color: var(--accent);
  color: var(--accent);
}

/* result count */
.result-count {
  margin-left: auto; font-size: 13px; color: var(--muted);
}

/* ── Movie Grid ─────────────────────────────────────────── */
.grid-section {
  padding: 0 clamp(16px,4vw,48px) 80px;
  position: relative;
  z-index: 1;
}
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px;
}

.movie-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s, border-color .3s;
  animation: cardIn .5s both;
  position: relative;
}
.movie-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: var(--shadow);
  border-color: rgba(232,184,75,.35);
}
@keyframes cardIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-poster {
  position: relative; aspect-ratio: 2/3;
  background: var(--surface);
  overflow: hidden;
}
.card-poster img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform .4s ease;
}
.movie-card:hover .card-poster img { transform: scale(1.06); }

.card-poster-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px;
  background: linear-gradient(135deg, #1a1a25, #0e0e18);
  color: var(--muted);
}
.card-poster-placeholder .ph-icon { font-size: 40px; opacity: .4; }
.card-poster-placeholder .ph-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px; letter-spacing: 2px; text-align: center;
  padding: 0 12px; opacity: .6;
}

.card-badge {
  position: absolute; top: 10px; left: 10px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase;
}
.badge-movie  { background: rgba(232,184,75,.18); color: #e8b84b; }
.badge-tv     { background: rgba(232,96,75,.18);  color: #e8604b; }

.play-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.5);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .3s;
}
.movie-card:hover .play-overlay { opacity: 1; }
.play-btn-circle {
  width: 52px; height: 52px; border-radius: 50%;
  background: linear-gradient(135deg,#e8b84b,#e8604b);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  transform: scale(.8); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.movie-card:hover .play-btn-circle { transform: scale(1); }

.card-info { padding: 14px 14px 16px; }
.card-title {
  font-weight: 600; font-size: 14px;
  line-height: 1.35; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--muted);
}
.meta-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

/* ── No Results ─────────────────────────────────────────── */
.no-results {
  grid-column: 1 / -1;
  text-align: center; padding: 80px 20px;
  color: var(--muted);
  display: none;
}
.no-results .nr-icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }
.no-results p { font-size: 16px; }

/* ── Modal Overlay ──────────────────────────────────────── */
#modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.85);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  opacity: 0; visibility: hidden;
  transition: opacity .35s, visibility .35s;
}
#modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  width: 100%; max-width: 860px;
  max-height: 92vh;
  overflow-y: auto;
  transform: translateY(30px) scale(.96);
  transition: transform .4s cubic-bezier(.2,1.2,.4,1);
  box-shadow: 0 40px 100px rgba(0,0,0,.7);
}
#modal-overlay.open .modal { transform: translateY(0) scale(1); }

/* video */
.modal-video-wrap {
  position: relative; aspect-ratio: 16/9;
  background: #000; border-radius: 18px 18px 0 0; overflow: hidden;
}
.modal-video-wrap video {
  width: 100%; height: 100%; display: block;
}
.modal-video-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px;
  background: linear-gradient(135deg,#0e0e16,#1a1025);
  color: var(--muted);
}
.modal-video-placeholder .vp-icon { font-size: 56px; opacity: .35; }
.modal-video-placeholder p { font-size: 14px; opacity: .55; }

/* modal body */
.modal-body { padding: 24px 28px 28px; }
.modal-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 16px;
  margin-bottom: 16px;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(22px, 4vw, 32px);
  letter-spacing: 2px; line-height: 1.1;
}
.modal-close {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--text); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .2s, border-color .2s, transform .2s;
}
.modal-close:hover { background: var(--accent); border-color: var(--accent); color: #000; transform: rotate(90deg); }

.modal-meta-row {
  display: flex; align-items: center; flex-wrap: wrap; gap: 10px;
  margin-bottom: 16px;
}
.modal-badge {
  padding: 4px 12px; border-radius: 99px;
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase;
}
.modal-badge.movie { background: rgba(232,184,75,.15); color: #e8b84b; }
.modal-badge.tv    { background: rgba(232,96,75,.15);  color: #e8604b; }
.modal-meta-text { font-size: 13px; color: var(--muted); }

.modal-desc { font-size: 14px; line-height: 1.75; color: var(--muted); margin-bottom: 24px; }

/* player options */
.player-options {
  display: flex; flex-wrap: wrap; gap: 10px;
}
.p-opt-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: all .25s;
  border: 1.5px solid var(--border);
}
.p-opt-btn.primary {
  background: linear-gradient(135deg,#e8b84b,#e8604b);
  border-color: transparent; color: #0a0a0f; font-weight: 700;
}
.p-opt-btn.primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.p-opt-btn.secondary {
  background: var(--surface); color: var(--text);
}
.p-opt-btn.secondary:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--pill-bg);
}
.p-opt-btn.download {
  background: rgba(99,204,144,.08);
  border-color: rgba(99,204,144,.25);
  color: #63cc90;
}
.p-opt-btn.download:hover {
  background: rgba(99,204,144,.15);
  border-color: #63cc90;
  transform: translateY(-1px);
}

/* quality selector inside modal */
.quality-row {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; margin-top: 14px;
}
.quality-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-right: 4px; }
.q-btn {
  padding: 6px 12px; border-radius: 8px; font-size: 12px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.q-btn:hover, .q-btn.active {
  border-color: var(--accent); color: var(--accent);
  background: var(--pill-bg);
}

/* ── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── Footer ─────────────────────────────────────────────── */
footer {
  text-align: center; padding: 28px;
  font-size: 12px; color: var(--muted);
  border-top: 1px solid var(--border);
  letter-spacing: 1px;
}

</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     LOADING SCREEN
═════════════════════════════════════════════════════════ -->
<div id="loader">
  <div class="loader-logo">CineVault</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
  <div class="loader-sub">Loading your library…</div>
</div>

<!-- ════════════════════════════════════════════════════════
     HEADER
═════════════════════════════════════════════════════════ -->
<header>
  <a class="logo" href="#">CineVault</a>
  <div class="header-right">
    <button class="theme-btn" id="themeBtn" title="Toggle theme" aria-label="Toggle dark/light mode">
      <span class="theme-icon-moon">🌙</span>
      <div class="theme-thumb"></div>
      <span class="theme-icon-sun">☀️</span>
    </button>
  </div>
</header>

<!-- ════════════════════════════════════════════════════════
     HERO + SEARCH
═════════════════════════════════════════════════════════ -->
<section class="hero">
  <h1>Your Personal <span>Cinema</span></h1>
  <p>Browse, filter and watch your entire collection in one place.</p>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search movies or shows…" autocomplete="off" />
    <span class="search-icon">🔍</span>
  </div>
</section>

<!-- ════════════════════════════════════════════════════════
     FILTER BAR
═════════════════════════════════════════════════════════ -->
<section class="filter-section">
  <div class="filter-row">
    <span class="filter-label">Filter</span>

    <!-- Type dropdown -->
    <div class="dropdown-wrap">
      <button class="dropdown-btn" id="typeDropBtn">
        <span id="typeDropLabel">All Types</span>
        <span class="dropdown-arrow">▼</span>
      </button>
      <div class="dropdown-menu" id="typeDropMenu">
        <div class="dropdown-item active" data-type="all">
          <span class="item-dot"></span>All Types
        </div>
        <div class="dropdown-item" data-type="movie">
          <span class="item-dot"></span>🎬 Movies
        </div>
        <div class="dropdown-item" data-type="tv">
          <span class="item-dot"></span>📺 TV Shows
        </div>
      </div>
    </div>

    <!-- Genre pills -->
    <button class="genre-pill active" data-genre="all">All Genres</button>
    <button class="genre-pill" data-genre="action">Action</button>
    <button class="genre-pill" data-genre="comedy">Comedy</button>
    <button class="genre-pill" data-genre="drama">Drama</button>
    <button class="genre-pill" data-genre="sci-fi">Sci-Fi</button>
    <button class="genre-pill" data-genre="horror">Horror</button>
    <button class="genre-pill" data-genre="thriller">Thriller</button>
    <button class="genre-pill" data-genre="animation">Animation</button>

    <span class="result-count" id="resultCount">0 titles</span>
  </div>
</section>

<!-- ════════════════════════════════════════════════════════
     MOVIE GRID
═════════════════════════════════════════════════════════ -->
<section class="grid-section">
  <div class="movie-grid" id="movieGrid">
    <div class="no-results" id="noResults">
      <div class="nr-icon">🎞️</div>
      <p>No titles found. Try a different search.</p>
    </div>
  </div>
</section>

<!-- ════════════════════════════════════════════════════════
     PLAYER MODAL
═════════════════════════════════════════════════════════ -->
<div id="modal-overlay">
  <div class="modal" id="playerModal">
    <div class="modal-video-wrap" id="modalVideoWrap"></div>
    <div class="modal-body">
      <div class="modal-top">
        <div class="modal-title" id="modalTitle">Title</div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-meta-row" id="modalMeta"></div>
      <p class="modal-desc" id="modalDesc"></p>

      <div class="player-options" id="playerOptions"></div>
      <div class="quality-row" id="qualityRow"></div>
    </div>
  </div>
</div>

<footer>© 2025 CineVault — Your private cinema library</footer>

<!-- ════════════════════════════════════════════════════════
     JAVASCRIPT
═════════════════════════════════════════════════════════ -->
<script>
/* ──────────────────────────────────────────────────────────
   ★  MOVIE / TV SHOW CONFIGURATION
   ──────────────────────────────────────────────────────────
   To add a title, copy one of the blocks below and fill in:

   id        : unique string identifier (no spaces)
   title     : display name
   type      : "movie"  ← for films
               "tv"     ← for TV shows / series
   year      : release year (string)
   genre     : one of: "action","comedy","drama","sci-fi",
                       "horror","thriller","animation"
   description: short synopsis shown in the player
   poster    : path to a poster image  (e.g. "posters/myfilm.jpg")
               leave "" to show an auto placeholder
   videoFile : path to the video file  (e.g. "videos/myfilm.mp4")
               leave "" if file not yet available
   downloadUrl: URL or path for the download button
                leave "" to disable the download button

   ────────────────────────────────────────────────────────── */
const LIBRARY = [

  /* ── EXAMPLE MOVIE ── */
  {
    id: "example-movie-1",
    title: "The Lost Horizon",
    type: "movie",          // ← "movie" or "tv"
    year: "2023",
    genre: "action",
    description: "A rogue archaeologist races against time to prevent an ancient weapon from falling into the wrong hands.",
    poster: "",             // ← e.g. "posters/lost-horizon.jpg"
    videoFile: "",          // ← e.g. "videos/lost-horizon.mp4"
    downloadUrl: ""         // ← e.g. "videos/lost-horizon.mp4"
  },

  /* ── EXAMPLE TV SHOW ── */
  {
    id: "example-tv-1",
    title: "Dark Signal",
    type: "tv",             // ← "movie" or "tv"
    year: "2022",
    genre: "sci-fi",
    description: "A classified research station starts receiving transmissions from the future. Season 1.",
    poster: "",
    videoFile: "",
    downloadUrl: ""
  },

  /* ── ANOTHER MOVIE ── */
  {
    id: "example-movie-2",
    title: "Neon Requiem",
    type: "movie",
    year: "2024",
    genre: "thriller",
    description: "In a neon-soaked city, a jazz musician stumbles into a conspiracy that reaches the highest levels of power.",
    poster: "",
    videoFile: "",
    downloadUrl: ""
  },

  /* ── ADD MORE TITLES BELOW — JUST COPY A BLOCK ABOVE ──
  {
    id: "my-film",
    title: "My Film Title",
    type: "movie",
    year: "2024",
    genre: "drama",
    description: "Your description here.",
    poster: "posters/my-film.jpg",
    videoFile: "videos/my-film.mp4",
    downloadUrl: "videos/my-film.mp4"
  },
  */
];


/* ──────────────────────────────────────────────────────────
   THEME (persisted in localStorage)
────────────────────────────────────────────────────────── */
const html      = document.documentElement;
const themeBtn  = document.getElementById('themeBtn');
const savedTheme = localStorage.getItem('cv-theme') || 'dark';
html.setAttribute('data-theme', savedTheme);

themeBtn.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('cv-theme', next);
});

/* ──────────────────────────────────────────────────────────
   LOADING SCREEN
────────────────────────────────────────────────────────── */
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loader').classList.add('hide');
  }, 1600);
});

/* ──────────────────────────────────────────────────────────
   STATE
────────────────────────────────────────────────────────── */
let activeType  = 'all';
let activeGenre = 'all';
let searchQuery = '';

/* ──────────────────────────────────────────────────────────
   RENDER
────────────────────────────────────────────────────────── */
const grid      = document.getElementById('movieGrid');
const noResults = document.getElementById('noResults');
const resCount  = document.getElementById('resultCount');

function render() {
  const q = searchQuery.toLowerCase();
  const filtered = LIBRARY.filter(m => {
    const typeOk  = activeType  === 'all' || m.type  === activeType;
    const genreOk = activeGenre === 'all' || m.genre === activeGenre;
    const searchOk = !q ||
      m.title.toLowerCase().includes(q) ||
      m.genre.toLowerCase().includes(q) ||
      m.year.includes(q) ||
      m.description.toLowerCase().includes(q);
    return typeOk && genreOk && searchOk;
  });

  // remove cards (keep no-results node)
  Array.from(grid.querySelectorAll('.movie-card')).forEach(c => c.remove());

  resCount.textContent = `${filtered.length} title${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    noResults.style.display = 'block';
    return;
  }
  noResults.style.display = 'none';

  filtered.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.style.animationDelay = `${i * 0.05}s`;

    const posterHtml = m.poster
      ? `<img src="${m.poster}" alt="${m.title}" loading="lazy" />`
      : `<div class="card-poster-placeholder">
           <span class="ph-icon">${m.type === 'tv' ? '📺' : '🎬'}</span>
           <span class="ph-title">${m.title}</span>
         </div>`;

    card.innerHTML = `
      <div class="card-poster">
        ${posterHtml}
        <div class="card-badge badge-${m.type}">${m.type === 'tv' ? 'TV' : 'Movie'}</div>
        <div class="play-overlay"><div class="play-btn-circle">▶</div></div>
      </div>
      <div class="card-info">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">
          <span>${m.year}</span>
          <span class="meta-dot"></span>
          <span style="text-transform:capitalize">${m.genre}</span>
        </div>
      </div>`;

    card.addEventListener('click', () => openModal(m));
    grid.insertBefore(card, noResults);
  });
}

/* ──────────────────────────────────────────────────────────
   DROPDOWN
────────────────────────────────────────────────────────── */
const typeBtn    = document.getElementById('typeDropBtn');
const typeMenu   = document.getElementById('typeDropMenu');
const typeLabel  = document.getElementById('typeDropLabel');

typeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const open = typeMenu.classList.toggle('open');
  typeBtn.classList.toggle('open', open);
});
document.addEventListener('click', () => {
  typeMenu.classList.remove('open');
  typeBtn.classList.remove('open');
});
typeMenu.querySelectorAll('.dropdown-item').forEach(item => {
  item.addEventListener('click', () => {
    typeMenu.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    activeType = item.dataset.type;
    const labels = { all: 'All Types', movie: '🎬 Movies', tv: '📺 TV Shows' };
    typeLabel.textContent = labels[activeType];
    render();
  });
});

/* ──────────────────────────────────────────────────────────
   GENRE PILLS
────────────────────────────────────────────────────────── */
document.querySelectorAll('.genre-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeGenre = pill.dataset.genre;
    render();
  });
});

/* ──────────────────────────────────────────────────────────
   SEARCH
────────────────────────────────────────────────────────── */
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

/* ──────────────────────────────────────────────────────────
   MODAL
────────────────────────────────────────────────────────── */
const overlay   = document.getElementById('modal-overlay');
const modalWrap = document.getElementById('modalVideoWrap');
const modalTitle = document.getElementById('modalTitle');
const modalMeta  = document.getElementById('modalMeta');
const modalDesc  = document.getElementById('modalDesc');
const playerOpts = document.getElementById('playerOptions');
const qualRow    = document.getElementById('qualityRow');

function openModal(m) {
  // video / placeholder
  modalWrap.innerHTML = m.videoFile
    ? `<video id="mainVideo" controls autoplay>
         <source src="${m.videoFile}" type="video/mp4" />
         Your browser does not support HTML5 video.
       </video>`
    : `<div class="modal-video-placeholder">
         <span class="vp-icon">${m.type === 'tv' ? '📺' : '🎬'}</span>
         <p>Video file not yet configured</p>
         <p style="font-size:11px;opacity:.4">Set <code>videoFile</code> in LIBRARY config</p>
       </div>`;

  modalTitle.textContent = m.title;

  modalMeta.innerHTML = `
    <span class="modal-badge ${m.type}">${m.type === 'tv' ? 'TV Show' : 'Movie'}</span>
    <span class="modal-meta-text">${m.year}</span>
    <span class="modal-meta-text">•</span>
    <span class="modal-meta-text" style="text-transform:capitalize">${m.genre}</span>`;

  modalDesc.textContent = m.description;

  // player buttons
  const dlBtn = m.downloadUrl
    ? `<button class="p-opt-btn download" onclick="downloadFile('${m.downloadUrl}','${m.title}')">
         ⬇ Download
       </button>`
    : '';

  playerOpts.innerHTML = `
    ${m.videoFile ? '<button class="p-opt-btn primary" onclick="playVideo()">▶ Play Now</button>' : ''}
    <button class="p-opt-btn secondary" onclick="toggleMute()">🔇 Mute / Unmute</button>
    <button class="p-opt-btn secondary" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    <button class="p-opt-btn secondary" onclick="togglePiP()">⧉ Picture-in-Picture</button>
    ${dlBtn}`;

  // quality row (visual only — swap src for real quality variants)
  qualRow.innerHTML = `
    <span class="quality-label">Quality</span>
    <button class="q-btn active" data-q="auto">Auto</button>
    <button class="q-btn" data-q="1080p">1080p</button>
    <button class="q-btn" data-q="720p">720p</button>
    <button class="q-btn" data-q="480p">480p</button>`;

  qualRow.querySelectorAll('.q-btn').forEach(b => {
    b.addEventListener('click', () => {
      qualRow.querySelectorAll('.q-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      // TO IMPLEMENT: swap video src to quality-specific file
    });
  });

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const vid = document.getElementById('mainVideo');
  if (vid) vid.pause();
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* player helpers */
function playVideo() {
  const v = document.getElementById('mainVideo');
  if (v) v.play();
}
function toggleMute() {
  const v = document.getElementById('mainVideo');
  if (v) v.muted = !v.muted;
}
function toggleFullscreen() {
  const v = document.getElementById('mainVideo');
  if (!v) return;
  if (document.fullscreenElement) document.exitFullscreen();
  else v.requestFullscreen();
}
function togglePiP() {
  const v = document.getElementById('mainVideo');
  if (!v) return;
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else v.requestPictureInPicture().catch(() => {});
}
function downloadFile(url, title) {
  const a = document.createElement('a');
  a.href = url;
  a.download = title.replace(/\s+/g, '_') + '.mp4';
  a.click();
}

/* ── Initial render ─────────────────────────────────────── */
render();
</script>
</body>
</html>
